<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDVI分析ツール メインメニュー</title>
    <!-- LeafletやChart.jsは基本的に不要ですが、スタイルシートを適用するため残します -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

    <style>
        /* 基本的なリセットとフォント設定 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5; /* 明るいグレーの背景 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* メインコンテナの設定（メニュー全体を囲む） */
        .menu-container {
            background-color: white;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 700px; /* メニューの最大幅 */
        }

        /* タイトル */
        h1 {
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 2.5em;
            border-bottom: 3px solid #3498db; /* アクセントカラーのアンダーライン */
            padding-bottom: 10px;
        }

        /* 各リンク（ボタン）の共通スタイル */
        .menu-button {
            display: block;
            text-decoration: none; /* 下線を消す */
            background-color: #3498db; /* メインカラー (青) */
            color: white;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 1.2em;
            text-align: center;
            transition: background-color 0.3s, transform 0.2s; /* ホバー時のアニメーション */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: fit-content; /* 幅を内容に合わせる */
        }

        /* ボタンにマウスカーソルが乗ったときのアクション */
        .menu-button:hover {
            background-color: #2980b9; /* 少し濃い青にする */
            transform: translateY(-2px); /* 浮き上がらせる効果 */
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
        }

         /* 説明文のスタイル調整 */
        p {
             margin-top: 30px;
             color: #7f8c8d;
             font-size: 0.9em;
        }

    </style>
</head>
<body>
    <div class="menu-container">
        <h1>🛰️ NDVI分析ツール メニュー</h1>
        
        <!-- リンク①：APIを利用した解析 -->
        <a href="./NDVI_API_Analyzer.html" class="menu-button">
            🟢 APIによる解析 (NDVI_API_Analyzer.html)
        </a>

        <!-- リンク②：GeoTIFFファイルをアップロードして解析 -->
        <a href="./NDVI_GeoTIFF_Analayzer_1.html" class="menu-button">
            🟡 GeoTIFFファイルによる解析 (NDVI_GeoTIFF_Analayzer_1.html)
        </a>

        <p>※ 各リンクは、同じフォルダ内にあるファイルを起動します。</p>
    </div>
</body>
</html>
