<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NDVI Test - Tile Layer Check</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
.info {
  padding: 10px;
  background: rgba(255,255,255,0.9);
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 1000;
  border-radius: 5px;
  font-family: monospace;
  font-size: 12px;
  max-width: 300px;
}
</style>
</head>
<body>
<div id="map"></div>
<div class="info">
  <div><strong>Tile Layer Test</strong></div>
  <div id="status">Loading...</div>
  <button onclick="testOSM()">Test OpenStreetMap</button>
  <button onclick="testNDVI()">Test NASA NDVI</button>
  <button onclick="testSentinel()">Test Sentinel</button>
</div>

<script>
const map = L.map('map').setView([35.367, 132.755], 10);
let currentLayer = null;

function updateStatus(msg) {
  document.getElementById('status').textContent = msg;
  console.log(msg);
}

function testOSM() {
  updateStatus('OSM Loading...');
  if (currentLayer) map.removeLayer(currentLayer);
  currentLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OSM',
    maxZoom: 19
  }).addTo(map);
  updateStatus('✓ OSM Added');
}

function testNDVI() {
  updateStatus('NASA NDVI Loading...');
  if (currentLayer) map.removeLayer(currentLayer);
  currentLayer = L.tileLayer(
    'https://gibs.earthdata.nasa.gov/wmts-webmerc/MODIS_Terra_NDVI_8Day/default//GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpg',
    {
      attribution: 'NASA GIBS',
      maxZoom: 8,
      minZoom: 0
    }
  ).addTo(map);
  updateStatus('✓ NASA NDVI Added (zoom 0-8)');
}

function testSentinel() {
  updateStatus('Sentinel Loading...');
  if (currentLayer) map.removeLayer(currentLayer);
  // Sentinel Hub WMS（簡易版）
  currentLayer = L.tileLayer.wms(
    'https://services.sentinel-hub.com/ogc/wms/a9e2e739-e29f-43f9-8e3e-d1b859ac0f8b',
    {
      layers: 'TRUE_COLOR',
      attribution: 'Sentinel Hub',
      maxZoom: 18,
      transparent: true,
      time: '2026-04-29'
    }
  ).addTo(map);
  updateStatus('✓ Sentinel Added');
}

// デフォルトで OSM を表示
testOSM();
</script>
</body>
</html>
