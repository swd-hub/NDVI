<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDVI Analyzer GEE — Standalone</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet & Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        #map { height: 100%; width: 100%; border-radius: 8px; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
        input[type="range"] { accent-color: #059669; }
    </style>
</head>
<body class="bg-white text-slate-900 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="flex items-center gap-3 px-4 py-2 bg-slate-50 border-b border-slate-200 z-50 shrink-0">
        <div class="bg-emerald-600 p-1.5 rounded-lg text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10a8 8 0 0 0-8 8"/><path d="M12 2v8"/><path d="M4 10a8 8 0 0 0 8-8"/><path d="M20 10a8 8 0 0 1-8-8"/><path d="m12 10 8 8"/><path d="M12 22v-8"/><path d="M20 22a8 8 0 0 0-8-8"/><path d="M4 22a8 8 0 0 1 8-8"/></svg>
        </div>
        <h1 class="font-mono text-sm font-bold">NDVI Analyzer <span class="text-emerald-600">[GEE]</span></h1>
        <div id="auth-status" class="ml-auto flex items-center gap-2 text-[10px] font-mono text-slate-500">
            <div id="live-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
            <span id="header-text">未接続</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-80 border-r border-slate-200 bg-slate-50 overflow-y-auto p-4 flex flex-col gap-6 scrollbar-thin">
            
            <!-- Connection -->
            <section>
                <div class="flex items-center gap-2 mb-3 text-[10px] font-bold text-emerald-600 uppercase tracking-widest">
                    <span>GEE 接続設定</span><div class="flex-1 h-px bg-slate-200"></div>
                </div>
                <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-3 space-y-3">
                    <input id="inp-project" type="text" value="ai-test-2026" placeholder="Project ID" class="w-full bg-white border border-emerald-100 rounded-lg px-3 py-1.5 text-xs font-mono outline-none">
                    <input id="inp-client" type="text" value="409312431902-5qtfmognhv1rgt5esjnsu8l0p55gt201.apps.googleusercontent.com" placeholder="Client ID" class="w-full bg-white border border-emerald-100 rounded-lg px-3 py-1.5 text-xs font-mono outline-none">
                    <button onclick="requestAuth()" class="w-full bg-emerald-700 text-white py-2 rounded-lg text-xs font-bold hover:bg-emerald-800 transition-all">Google ログイン</button>
                </div>
            </section>

            <!-- Data Source & Date -->
            <section>
                <div class="flex items-center gap-2 mb-3 text-[10px] font-bold text-emerald-600 uppercase tracking-widest">
                    <span>データソース / 期間</span><div class="flex-1 h-px bg-slate-200"></div>
                </div>
                <div class="flex gap-2 mb-3">
                    <button onclick="setSource('modis')" class="flex-1 p-2 rounded-lg border text-[10px] font-bold bg-emerald-100 border-emerald-400 text-emerald-800" id="btn-modis">MODIS (1km)</button>
                    <button onclick="setSource('sentinel')" class="flex-1 p-2 rounded-lg border text-[10px] font-bold bg-white border-slate-200 text-slate-600" id="btn-sentinel">Sentinel-2 (10m)</button>
                </div>
                <div class="bg-white border border-slate-200 rounded-xl p-3">
                    <div id="month-disp" class="text-center font-mono text-xl font-bold text-emerald-600 mb-2">2024/01</div>
                    <input id="month-slider" type="range" class="w-full mb-1">
                    <div class="flex justify-between text-[9px] font-mono text-slate-400">
                        <span id="date-min">2000/03</span><span id="date-max">NOW</span>
                    </div>
                </div>
            </section>

            <!-- Region -->
            <section>
                <div class="flex items-center gap-2 mb-3 text-[10px] font-bold text-emerald-600 uppercase tracking-widest">
                    <span>解析範囲</span><div class="flex-1 h-px bg-slate-200"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <button onclick="applyPreset('izumo')" class="bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold hover:bg-emerald-50">📍 Izumo</button>
                    <button onclick="applyPreset('shimane')" class="bg-white border border-slate-200 rounded-lg p-2 text-[10px] font-bold hover:bg-emerald-50">📍 Shimane</button>
                </div>
                <div class="grid grid-cols-2 gap-2 text-[10px] font-mono bg-slate-100 p-2 rounded-lg">
                    <input id="bboxW" type="number" step="0.01" class="rounded px-1">
                    <input id="bboxE" type="number" step="0.01" class="rounded px-1">
                    <input id="bboxS" type="number" step="0.01" class="rounded px-1">
                    <input id="bboxN" type="number" step="0.01" class="rounded px-1">
                </div>
            </section>

            <!-- NDVI Scale -->
            <section>
                <div class="flex items-center gap-2 mb-3 text-[10px] font-bold text-emerald-600 uppercase tracking-widest">
                    <span>NDVI カラースケール</span><div class="flex-1 h-px bg-slate-200"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input id="ndvi-min" type="number" value="-0.2" step="0.05" class="text-xs p-1 border rounded">
                    <input id="ndvi-max" type="number" value="0.9" step="0.05" class="text-xs p-1 border rounded">
                </div>
                <div class="h-2 w-full rounded-full bg-gradient-to-r from-[rgb(139,69,19)] via-[rgb(245,245,220)] to-[rgb(0,100,0)] mb-1"></div>
            </section>

            <!-- Actions -->
            <section class="mt-auto space-y-2">
                <button onclick="renderNDVI()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> NDVI 描画
                </button>
                <div id="status" class="bg-slate-100 border border-slate-200 rounded-lg p-3 text-[11px] font-mono text-slate-500">ログインして開始</div>
                <div class="flex gap-2">
                    <button onclick="startDraw()" class="flex-1 py-2 border rounded-lg bg-white text-[10px] font-bold">📐 矩形選択</button>
                    <button onclick="clearNDVI()" class="flex-1 py-2 border rounded-lg bg-white text-[10px] font-bold">🗑 クリア</button>
                </div>
            </section>
        </aside>

        <!-- Map Area -->
        <main class="flex-1 relative">
            <div id="map"></div>
            <div class="absolute bottom-4 left-4 z-[400] bg-white/80 backdrop-blur px-3 py-1.5 rounded-full border border-slate-200 text-[10px] font-mono text-slate-600 shadow-sm">
                Powered by <span class="text-emerald-600 font-bold">Google Earth Engine</span>
            </div>
        </main>
    </div>

    <script>
        // --- Core Configuration ---
        const GEE_BASE = 'https://earthengine.googleapis.com/v1';
        let accessToken = null, tokenExpiry = 0, projectId = '', clientId = '';
        let currentSource = 'modis';
        
        const PRESETS = {
            izumo: { center: [35.367, 132.755], zoom: 11, bbox: [132.55, 35.24, 132.95, 35.52] },
            shimane: { center: [35.1, 132.3], zoom: 9, bbox: [131.6, 34.2, 133.6, 35.8] }
        };

        const DATES = (() => {
            const r = []; const now = new Date();
            let y = 2000, m = 3;
            while (y < now.getUTCFullYear() || (y === now.getUTCFullYear() && m <= now.getUTCMonth())) {
                const date = new Date(Date.UTC(y, m - 1, 1));
                r.push({
                    label: `${y}/${String(m).padStart(2, '0')}`,
                    iso: `${y}-${String(m).padStart(2, '0')}-01`,
                    nextIso: m === 12 ? `${y+1}-01-01` : `${y}-${String(m+1).padStart(2, '0')}-01`
                });
                if (++m > 12) { m = 1; y++; }
            }
            return r;
        })();

        // --- Leaflet Auth Layer ---
        const AuthTileLayer = L.GridLayer.extend({
            initialize(mapName, token, options) {
                this.mapName = mapName; this.token = token;
                L.GridLayer.prototype.initialize.call(this, options);
            },
            createTile(coords, done) {
                const canvas = document.createElement('canvas');
                canvas.width = canvas.height = 256;
                const url = `${GEE_BASE}/${this.mapName}/tiles/${coords.z}/${coords.x}/${coords.y}`;
                fetch(url, { headers: { Authorization: `Bearer ${this.token}` } })
                    .then(r => r.ok ? r.blob() : Promise.reject())
                    .then(blob => createImageBitmap(blob))
                    .then(bmp => { canvas.getContext('2d').drawImage(bmp, 0, 0); done(null, canvas); })
                    .catch(() => done(null, canvas));
                return canvas;
            }
        });

        // --- Map Initialization ---
        const map = L.map('map', { center: PRESETS.izumo.center, zoom: PRESETS.izumo.zoom, zoomControl: false });
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', { attribution: '地理院淡色' }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        const drawnItems = new L.FeatureGroup().addTo(map);
        const drawControl = new L.Control.Draw({
            draw: { rectangle: { shapeOptions: { color: '#059669', fillOpacity: 0 } }, polygon: false, circle: false, marker: false, polyline: false, circlemarker: false }
        });
        map.on(L.Draw.Event.CREATED, (e) => {
            drawnItems.clearLayers(); drawnItems.addLayer(e.layer);
            const b = e.layer.getBounds();
            updateBBoxFromBounds(b);
        });

        let ndviLayer = null, bboxRect = null;

        // --- Logic & Events ---
        function requestAuth() {
            projectId = document.getElementById('inp-project').value;
            clientId = document.getElementById('inp-client').value;
            const client = google.accounts.oauth2.initTokenClient({
                client_id: clientId,
                scope: 'https://www.googleapis.com/auth/earthengine.readonly',
                callback: (resp) => {
                    if (resp.error) return;
                    accessToken = resp.access_token;
                    document.getElementById('live-dot').className = 'w-2 h-2 rounded-full bg-emerald-500';
                    document.getElementById('header-text').textContent = '接続済み: ' + projectId;
                    setStatus('認証成功 ✓ 描画できます', 'ok');
                }
            });
            client.requestAccessToken({ prompt: '' });
        }

        async function geePost(endpoint, body) {
            const url = `${GEE_BASE}/projects/${projectId}/${endpoint}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return res.json();
        }

        async function renderNDVI() {
            if (!accessToken) return setStatus('ログインしてください', 'error');
            const date = DATES[document.getElementById('month-slider').value];
            const ndviMin = +document.getElementById('ndvi-min').value;
            const ndviMax = +document.getElementById('ndvi-max').value;
            setStatus('タイル作成中...', 'loading');

            const expr = {
                values: {
                    col: { functionInvocationValue: { functionName: 'ImageCollection.load', arguments: { id: { constantValue: currentSource === 'modis' ? 'MODIS/061/MOD13A3' : 'COPERNICUS/S2_SR_HARMONIZED' } } } },
                    filtered: { functionInvocationValue: { functionName: 'ImageCollection.filterDate', arguments: { collection: { valueReference: 'col' }, start: { constantValue: date.iso }, end: { constantValue: date.nextIso } } } },
                    img: { functionInvocationValue: { functionName: 'ImageCollection.first', arguments: { collection: { valueReference: 'filtered' } } } },
                    viz: { functionInvocationValue: { functionName: 'Image.visualize', arguments: { 
                        image: { functionInvocationValue: { functionName: 'Image.select', arguments: { input: { valueReference: 'img' }, bandSelectors: { constantValue: [currentSource === 'modis' ? 'NDVI' : 'B8'] } } } },
                        min: { constantValue: Math.round(ndviMin / 0.0001) }, max: { constantValue: Math.round(ndviMax / 0.0001) },
                        palette: { constantValue: ['8B4513','D2B48C','F5F5DC','90EE90','32CD32','006400'] }
                    } } }
                },
                result: 'viz'
            };

            try {
                const resp = await geePost('maps', { expression: expr, fileFormat: 'PNG' });
                if (ndviLayer) map.removeLayer(ndviLayer);
                ndviLayer = new AuthTileLayer(resp.name, accessToken, { opacity: 0.8 }).addTo(map);
                setStatus(`描画完了: ${date.label}`, 'ok');
            } catch (e) { setStatus('APIエラー', 'error'); }
        }

        const slider = document.getElementById('month-slider');
        slider.max = DATES.length - 1; slider.value = DATES.length - 1;
        slider.addEventListener('input', () => { document.getElementById('month-disp').textContent = DATES[slider.value].label; });

        function setSource(s) {
            currentSource = s;
            document.getElementById('btn-modis').className = s === 'modis' ? 'flex-1 p-2 rounded-lg border text-[10px] font-bold bg-emerald-100 border-emerald-400 text-emerald-800' : 'flex-1 p-2 rounded-lg border text-[10px] font-bold bg-white border-slate-200 text-slate-600';
            document.getElementById('btn-sentinel').className = s === 'sentinel' ? 'flex-1 p-2 rounded-lg border text-[10px] font-bold bg-emerald-100 border-emerald-400 text-emerald-800' : 'flex-1 p-2 rounded-lg border text-[10px] font-bold bg-white border-slate-200 text-slate-600';
        }

        function applyPreset(k) {
            const p = PRESETS[k]; map.setView(p.center, p.zoom);
            document.getElementById('bboxW').value = p.bbox[0]; document.getElementById('bboxS').value = p.bbox[1];
            document.getElementById('bboxE').value = p.bbox[2]; document.getElementById('bboxN').value = p.bbox[3];
            updateRect(p.bbox);
        }

        function updateRect(b) {
            if (bboxRect) map.removeLayer(bboxRect);
            bboxRect = L.rectangle([[b[1], b[0]], [b[3], b[2]]], { color: '#059669', fillOpacity: 0, weight: 1 }).addTo(map);
        }

        function updateBBoxFromBounds(b) {
            document.getElementById('bboxW').value = b.getWest().toFixed(4);
            document.getElementById('bboxE').value = b.getEast().toFixed(4);
            document.getElementById('bboxS').value = b.getSouth().toFixed(4);
            document.getElementById('bboxN').value = b.getNorth().toFixed(4);
            updateRect([+b.getWest(), +b.getSouth(), +b.getEast(), +b.getNorth()]);
        }

        function setStatus(m, t) {
            const el = document.getElementById('status');
            el.textContent = m;
            el.className = `bg-${t==='error'?'rose':t==='ok'?'emerald':'slate'}-50 border border-${t==='error'?'rose':t==='ok'?'emerald':'slate'}-200 rounded-lg p-3 text-[11px] font-mono text-${t==='error'?'rose':t==='ok'?'emerald':'slate'}-700`;
        }

        function startDraw() { new L.Draw.Rectangle(map, drawControl.options.draw.rectangle).enable(); }
        function clearNDVI() { if (ndviLayer) map.removeLayer(ndviLayer); ndviLayer = null; setStatus('クリアしました'); }

        applyPreset('izumo');
    </script>
</body>
</html>
