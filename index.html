<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-2 COG NDVI Viewer</title>
    <!-- 外部ライブラリの読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        #map { height: 600px; width: 100%; border-radius: 12px; z-index: 1; outline: none; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* 拡大時にボケないようにする設定 */
        .leaflet-image-layer { image-rendering: crisp-edges; image-rendering: pixelated; }
    </style>
</head>
<body class="text-slate-900 min-h-screen p-4 md:p-8">
    <div id="root"></div>

    <!-- React, Leaflet, GeoTIFF, proj4 読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const mapRef = useRef(null);
            const layerRef = useRef(null);
            const footprintsRef = useRef(null);
            const [status, setStatus] = useState({ msg: '準備完了', type: 'ok' });
            const [searchResults, setSearchResults] = useState([]);
            const [opacity, setOpacity] = useState(85);
            const [legend, setLegend] = useState(null);

            useEffect(() => {
                if (!mapRef.current) {
                    const map = L.map('map').setView([35.367, 132.755], 11);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(map);
                    
                    const footprints = new L.FeatureGroup().addTo(map);
                    footprintsRef.current = footprints;
                    mapRef.current = map;
                }
            }, []);

            const searchScenes = async () => {
                setStatus({ msg: 'Earth Search (STAC API) 検索中...', type: 'loading' });
                footprintsRef.current.clearLayers();
                try {
                    const bounds = mapRef.current.getBounds();
                    const bbox = [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()];
                    
                    const response = await fetch('https://earth-search.aws.element84.com/v1/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            collections: ['sentinel-2-l2a'],
                            bbox: bbox,
                            limit: 8,
                            query: { 'eo:cloud_cover': { lt: 40 } },
                            sortby: [{ field: "properties.datetime", direction: "desc" }]
                        })
                    });
                    
                    const data = await response.json();
                    if (!data.features || data.features.length === 0) {
                        setStatus({ msg: 'この範囲にシーンが見つかりません', type: 'error' });
                    } else {
                        setSearchResults(data.features);
                        data.features.forEach(f => {
                            const b = f.bbox;
                            L.rectangle([[b[1], b[0]], [b[3], b[2]]], {
                                color: '#3b82f6', weight: 1, fillOpacity: 0.03, interactive: false
                            }).addTo(footprintsRef.current);
                        });
                        setStatus({ msg: `✅ ${data.features.length} 件見つかりました (青枠が範囲)`, type: 'ok' });
                    }
                } catch (e) {
                    setStatus({ msg: `検索失敗: ${e.message}`, type: 'error' });
                }
            };

            const loadScene = async (feature) => {
                setStatus({ msg: 'COGを解析中... (解像度: 1500px)', type: 'loading' });
                try {
                    const assets = feature.assets;
                    const b04 = assets.red || assets.B04 || assets.b04;
                    const b08 = assets.nir || assets.B08 || assets.b08;

                    // S3 URLをHTTPSに変換
                    const toHttps = (href) => href.startsWith('s3://') 
                        ? href.replace(/^s3:\/\/([^/]+)\/(.+)$/, 'https://$1.s3.us-west-2.amazonaws.com/$2') 
                        : href;
                    
                    const tiff04 = await GeoTIFF.fromUrl(toHttps(b04.href));
                    const tiff08 = await GeoTIFF.fromUrl(toHttps(b08.href));

                    // メタデータ取得用 (オーバービューではなく元画像から)
                    const img04Base = await tiff04.getImage(0);
                    
                    // 鮮明度を上げるため1500pxに近いオーバービューを検索
                    const getBestOverview = async (tiff, target) => {
                        const count = await tiff.getImageCount();
                        let best = await tiff.getImage(0);
                        let bestDiff = Math.abs(best.getWidth() - target);
                        for(let i=1; i<count; i++) {
                            try {
                                const img = await tiff.getImage(i);
                                const diff = Math.abs(img.getWidth() - target);
                                if (diff < bestDiff) {
                                    bestDiff = diff;
                                    best = img;
                                }
                            } catch(e) {}
                        }
                        return best;
                    };

                    const img04 = await getBestOverview(tiff04, 1500); 
                    const img08 = await getBestOverview(tiff08, 1500);

                    const [ras04, ras08] = await Promise.all([img04.readRasters(), img08.readRasters()]);
                    const rData = ras04[0];
                    const nData = ras08[0];
                    const w = img04.getWidth();
                    const h = img04.getHeight();
                    
                    const ndvi = new Float32Array(rData.length);
                    let minVal = 1, maxVal = -1;
                    for (let i = 0; i < rData.length; i++) {
                        const r = rData[i], n = nData[i];
                        if (r === 0 && n === 0) {
                            ndvi[i] = -999;
                        } else {
                            const v = (n - r) / (n + r);
                            ndvi[i] = v;
                            if (v < minVal) minVal = v;
                            if (v > maxVal) maxVal = v;
                        }
                    }

                    const bbox = img04Base.getBoundingBox();
                    const epsg = img04Base.geoKeys.ProjectedCSTypeGeoKey || img04Base.geoKeys.GeographicTypeGeoKey;
                    
                    const epsgKey = "EPSG:" + epsg;
                    if (!proj4.defs(epsgKey)) {
                        proj4.defs(epsgKey, "+proj=utm +zone=" + (epsg % 100) + " +datum=WGS84 +units=m +no_defs");
                    }

                    const sw = proj4(epsgKey, 'EPSG:4326', [bbox[0], bbox[1]]);
                    const ne = proj4(epsgKey, 'EPSG:4326', [bbox[2], bbox[3]]);
                    
                    renderLayer(ndvi, w, h, { west: sw[0], south: sw[1], east: ne[0], north: ne[1] }, minVal, maxVal);
                    
                    setStatus({ msg: '✓ ' + feature.id.slice(0,10) + ' 読込完了', type: 'ok' });
                    footprintsRef.current.clearLayers();
                    mapRef.current.fitBounds([[sw[1], sw[0]], [ne[1], ne[0]]]);
                } catch (e) {
                    console.error(e);
                    setStatus({ msg: '読込エラー: ' + e.message, type: 'error' });
                }
            };

            const renderLayer = (data, w, h, bb, min, max) => {
                if (layerRef.current) mapRef.current.removeLayer(layerRef.current);

                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                const img = ctx.createImageData(w, h);
                const px = img.data;

                for (let i = 0; i < data.length; i++) {
                    const v = data[i];
                    if (v === -999) { px[i*4+3] = 0; continue; }
                    
                    let r=0, g=0, b=0;
                    if (v < 0) { r=100; g=100; b=255; }
                    else if (v < 0.2) { r=190; g=170; b=120; }
                    else if (v < 0.4) { r=200; g=230; b=150; }
                    else if (v < 0.7) { r=50; g=205; b=50; }
                    else { r=0; g=100; b=0; }
                    
                    px[i*4]=r; px[i*4+1]=g; px[i*4+2]=b; px[i*4+3]=220;
                }
                ctx.putImageData(img, 0, 0);
                
                const bounds = [[bb.south, bb.west], [bb.north, bb.east]];
                const layer = L.imageOverlay(canvas.toDataURL(), bounds, { opacity: opacity/100 }).addTo(mapRef.current);
                layerRef.current = layer;
                setLegend({ min: min.toFixed(2), max: max.toFixed(2) });
            };

            return (
                <div className="max-w-7xl mx-auto space-y-6">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-3xl font-black text-emerald-900 tracking-tight">Sentinel-2 COG NDVI</h1>
                            <p className="text-sm text-slate-500 font-mono">High-Resolution Vegetation Index Viewer</p>
                        </div>
                        <div className={
                            "px-5 py-2.5 rounded-xl border-2 text-sm font-bold shadow-sm transition-all " + 
                            (status.type === 'loading' ? 'bg-amber-50 border-amber-200 text-amber-700 animate-pulse' : 
                             status.type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-emerald-50 border-emerald-200 text-emerald-700')
                        }>
                            {status.msg}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-3 space-y-6">
                            <section className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">操作パネル</h2>
                                <button 
                                    onClick={searchScenes} 
                                    className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg shadow-emerald-200 transition-all active:scale-95 disabled:opacity-50"
                                    disabled={status.type === 'loading'}
                                >
                                    この範囲を検索
                                </button>
                                
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">利用可能なシーン</label>
                                    <div className="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                        {searchResults.map(f => {
                                            const cloud = f.properties['eo:cloud_cover'];
                                            const date = new Date(f.properties.datetime).toLocaleDateString('ja-JP');
                                            return (
                                                <button 
                                                    key={f.id} 
                                                    onClick={() => loadScene(f)}
                                                    className="w-full text-left p-3 bg-slate-50 hover:bg-emerald-50 border border-slate-200 hover:border-emerald-300 rounded-xl transition-all group"
                                                >
                                                    <span className="block text-xs font-bold text-slate-700 group-hover:text-emerald-700 transition-colors">{date}</span>
                                                    <span className="text-[10px] text-slate-400 font-mono">雲: {cloud ? cloud.toFixed(1) : 0}%</span>
                                                </button>
                                            );
                                        })}
                                        {searchResults.length === 0 && (
                                            <div className="text-[10px] text-slate-400 italic text-center py-8 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                                検索ボタンを押してください
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </section>

                            <section className="bg-emerald-900 p-5 rounded-2xl text-white shadow-xl">
                                <h3 className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-4">NDVI 凡例</h3>
                                <div className="space-y-3">
                                    {[
                                        { c: '#6464ff', l: '水体・雪山', d: 'NDVI < 0' },
                                        { c: '#beaa78', l: '岩石・裸地・市街地', d: '0.0 - 0.2' },
                                        { c: '#c8e696', l: '低密度植生・草地', d: '0.2 - 0.4' },
                                        { c: '#32cd32', l: '中密度植生・農地', d: '0.4 - 0.7' },
                                        { c: '#006400', l: '高密度植生・森林', d: 'NDVI > 0.7' },
                                    ].map(item => (
                                        <div key={item.c} className="flex items-center gap-3">
                                            <div className="w-3 h-3 rounded-sm shrink-0 shadow-sm" style={{ backgroundColor: item.c }}></div>
                                            <div>
                                                <div className="text-[10px] font-bold leading-tight">{item.l}</div>
                                                <div className="text-[8px] text-emerald-400 font-mono tracking-tighter">{item.d}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-9 relative">
                            <div id="map" className="shadow-2xl border-4 border-white"></div>
                            {legend && (
                                <div className="absolute bottom-6 right-6 z-[1000] glass px-4 py-3 rounded-xl border border-slate-200 shadow-xl min-w-[180px]">
                                    <div className="text-[10px] font-black text-emerald-800 uppercase mb-2">統計</div>
                                    <div className="h-2 w-full rounded-full bg-gradient-to-r from-[#6464ff] via-[#beaa78] to-[#006400] mb-2" />
                                    <div className="flex justify-between text-[10px] font-mono font-bold text-slate-600">
                                        <span>Min: {legend.min}</span>
                                        <span>Max: {legend.max}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
