<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-2 NDVI Viewer (Standalone)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        #map { height: 600px; width: 100%; border-radius: 12px; z-index: 1; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">
    <div id="root"></div>

    <!-- ライブラリ読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const mapRef = useRef(null);
            const layerRef = useRef(null);
            const footprintsRef = useRef(null);
            const [status, setStatus] = useState({ msg: '準備完了', type: 'ok' });
            const [searchResults, setSearchResults] = useState([]);
            const [opacity, setOpacity] = useState(85);

            useEffect(() => {
                if (!mapRef.current) {
                    const map = L.map('map').setView([35.6812, 139.7671], 12);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(map);
                    
                    const footprints = new L.FeatureGroup().addTo(map);
                    footprintsRef.current = footprints;
                    mapRef.current = map;
                }
            }, []);

            // シーン検索 (Earth Search v1 API)
            const searchScenes = async () => {
                setStatus({ msg: '検索中...', type: 'loading' });
                footprintsRef.current.clearLayers();
                try {
                    const bounds = mapRef.current.getBounds();
                    const bbox = [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()];
                    
                    const response = await fetch('https://earth-search.aws.element84.com/v1/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            collections: ['sentinel-2-l2a'],
                            bbox: bbox,
                            limit: 5,
                            query: { 'eo:cloud_cover': { lt: 20 } }
                        })
                    });
                    
                    const data = await response.json();
                    if (!data.features || data.features.length === 0) {
                        setStatus({ msg: '見つかりませんでした', type: 'error' });
                    } else {
                        setSearchResults(data.features);
                        data.features.forEach(f => {
                            const b = f.bbox;
                            L.rectangle([[b[1], b[0]], [b[3], b[2]]], {
                                color: '#3b82f6', weight: 1, fillOpacity: 0.05, interactive: false
                            }).addTo(footprintsRef.current);
                        });
                        setStatus({ msg: `✅ ${data.features.length}件発見 (青枠が範囲)`, type: 'ok' });
                    }
                } catch (e) {
                    setStatus({ msg: `エラー: ${e.message}`, type: 'error' });
                }
            };

            // COGデータの読み込みとNDVI計算
            const loadScene = async (feature) => {
                setStatus({ msg: '読み込み・解析中...', type: 'loading' });
                try {
                    const assets = feature.assets;
                    const b04 = assets.red || assets.B04 || assets.b04;
                    const b08 = assets.nir || assets.B08 || assets.b08;

                    // AWS S3のURLをHTTPに変換
                    const toHttps = (href) => href.replace('s3://', 'https://sentinel-cogs.s3.us-west-2.amazonaws.com/');
                    
                    const tiff04 = await GeoTIFF.fromUrl(toHttps(b04.href));
                    const tiff08 = await GeoTIFF.fromUrl(toHttps(b08.href));

                    // 位置情報はベース画像(0)から取得 (Affine Transformationエラー回避)
                    const img04Base = await tiff04.getImage(0);
                    
                    // ピクセルデータは高速化のため縮小版(2)を使用
                    const img04 = await tiff04.getImage(2); 
                    const img08 = await tiff08.getImage(2);

                    const [ras04, ras08] = await Promise.all([img04.readRasters(), img08.readRasters()]);
                    const rData = ras04[0];
                    const nData = ras08[0];
                    
                    const ndvi = new Float32Array(rData.length);
                    for (let i = 0; i < rData.length; i++) {
                        const r = rData[i], n = nData[i];
                        ndvi[i] = (r + n === 0) ? -999 : (n - r) / (n + r);
                    }

                    const bbox = img04Base.getBoundingBox();
                    const epsg = img04Base.geoKeys.ProjectedCSTypeGeoKey || img04Base.geoKeys.GeographicTypeGeoKey;
                    
                    // 座標変換 (UTM等をWGS84へ)
                    const key = `EPSG:${epsg}`;
                    const sw = proj4(key, 'EPSG:4326', [bbox[0], bbox[1]]);
                    const ne = proj4(key, 'EPSG:4326', [bbox[2], bbox[3]]);
                    
                    renderNDVI(ndvi, img04.getWidth(), img04.getHeight(), { west: sw[0], south: sw[1], east: ne[0], north: ne[1] });
                    
                    setStatus({ msg: `✓ 読込完了`, type: 'ok' });
                    footprintsRef.current.clearLayers();
                    mapRef.current.fitBounds([[sw[1], sw[0]], [ne[1], ne[0]]]);
                } catch (e) {
                    console.error(e);
                    setStatus({ msg: `エラー: ${e.message}`, type: 'error' });
                }
            };

            const renderNDVI = (data, w, h, bb) => {
                if (layerRef.current) mapRef.current.removeLayer(layerRef.current);

                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                const img = ctx.createImageData(w, h);
                const px = img.data;

                for (let i = 0; i < data.length; i++) {
                    const v = data[i];
                    if (v === -999) { px[i*4+3] = 0; continue; }
                    
                    let r=0, g=0, b=0;
                    if (v < 0) { r=150, g=150, b=255; }
                    else if (v < 0.2) { r=200, g=200, b=200; }
                    else if (v < 0.4) { r=150, g=220, b=150; }
                    else if (v < 0.7) { r=50, g=205, b=50; }
                    else { r=0, g=100, b=0; }
                    
                    px[i*4]=r; px[i*4+1]=g; px[i*4+2]=b; px[i*4+3]=220;
                }
                ctx.putImageData(img, 0, 0);
                
                const bounds = [[bb.south, bb.west], [bb.north, bb.east]];
                const layer = L.imageOverlay(canvas.toDataURL(), bounds, { opacity: opacity/100 }).addTo(mapRef.current);
                layerRef.current = layer;
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-emerald-900 tracking-tight">Sentinel-2 NDVI Viewer</h1>
                            <p className="text-xs text-slate-500 font-mono font-bold uppercase">Cloud Optimized GeoTIFF Decoder</p>
                        </div>
                        <div className={`px-5 py-2 rounded-full text-sm font-bold shadow-sm ${
                            status.type === 'loading' ? 'bg-amber-100 text-amber-700 animate-pulse border border-amber-200' : 
                            status.type === 'error' ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-emerald-100 text-emerald-700 border border-emerald-200'
                        }`}>
                            {status.msg}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div className="lg:col-span-1 space-y-6">
                            <section className="glass p-5 rounded-2xl border border-white shadow-lg space-y-4">
                                <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Control Panel</h2>
                                <button onClick={searchScenes} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 text-sm">
                                    この範囲を検索
                                </button>
                                
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase px-1">シーン結果 (最大5件)</label>
                                    <div className="space-y-1 max-h-[300px] overflow-y-auto pr-1">
                                        {searchResults.map(f => (
                                            <button 
                                                key={f.id} 
                                                onClick={() => loadScene(f)}
                                                className="w-full text-left text-[11px] p-3 bg-white hover:bg-emerald-50 border border-slate-200 rounded-lg transition-colors truncate shadow-sm"
                                            >
                                                <span className="font-bold block text-slate-700">{new Date(f.properties.datetime).toLocaleDateString()}</span>
                                                <span className="text-slate-400">雲: {f.properties['eo:cloud_cover']?.toFixed(1)}%</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            <div className="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                <h3 className="text-xs font-bold text-slate-600 mb-3 uppercase tracking-wider">NDVI Legend</h3>
                                <div className="space-y-2">
                                    <div className="flex items-center gap-3 text-[11px] text-slate-600"><div className="w-4 h-4 rounded bg-[#9696ff]"></div> <span>水域・雪氷 (NDVI < 0)</span></div>
                                    <div className="flex items-center gap-3 text-[11px] text-slate-600"><div className="w-4 h-4 rounded bg-[#c8c8c8]"></div> <span>都市・裸地 (0 - 0.2)</span></div>
                                    <div className="flex items-center gap-3 text-[11px] text-slate-600"><div className="w-4 h-4 rounded bg-[#96dc96]"></div> <span>草原・疎林 (0.2 - 0.4)</span></div>
                                    <div className="flex items-center gap-3 text-[11px] text-slate-600"><div className="w-4 h-4 rounded bg-[#32cd32]"></div> <span>森林・密生 (0.4 - 0.7)</span></div>
                                    <div className="flex items-center gap-3 text-[11px] text-slate-600"><div className="w-4 h-4 rounded bg-[#006400]"></div> <span>極めて豊かな緑 (0.7 <)</span></div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-3">
                            <div id="map" className="shadow-2xl border-8 border-white"></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
